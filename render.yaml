services:
  - type: web
    name: bankassist-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this manually in Render dashboard
    healthCheckPath: /health
